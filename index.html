<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>阿漱外链网盘</title>
  <link href="https://s4.zstatic.net/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet">
  <link href="https://s4.zstatic.net/ajax/libs/twitter-bootstrap/3.4.1/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f4f4f4; font-family: "Microsoft YaHei", Arial, sans-serif; }
    .navbar { background: #006400; color: white; }
    .well { background: white; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .upload-area { border: 3px dashed #006400; padding: 60px 20px; text-align: center; margin: 20px 0; border-radius: 8px; background: #fafafa; }
    .upload-area:hover { border-color: #4CAF50; }
    audio { width: 100%; margin: 10px 0; }
  </style>
</head>
<body>

<div class="navbar navbar-default">
  <div class="container">
    <a class="navbar-brand" href="./" style="color:white;">阿漱外链网盘</a>
  </div>
</div>

<div class="container">
  <div class="well">
    <h2>文件列表</h2>

    <div class="upload-area">
      <h4><i class="fa fa-cloud-upload"></i> 拖拽或点击上传（支持图片、音乐）</h4>
      <p style="color:#666;">推荐单文件 &lt; 50MB（音乐建议先压缩）</p>
      <input type="file" id="fileInput" multiple style="display:none;">
      <button class="btn btn-success btn-lg" onclick="document.getElementById('fileInput').click()">
        选择文件上传
      </button>
    </div>

    <div class="table-responsive">
      <table class="table table-striped table-hover">
        <thead>
          <tr>
            <th>#</th>
            <th>操作</th>
            <th>文件名</th>
            <th>大小</th>
            <th>上传时间</th>
          </tr>
        </thead>
        <tbody id="fileList"></tbody>
      </table>
    </div>
  </div>
</div>

<script src="https://s4.zstatic.net/ajax/libs/jquery/1.12.4/jquery.min.js"></script>
<script>
// ================== 在这里粘贴你的 BLOB_READ_WRITE_TOKEN ==================
const BLOB_TOKEN = "vercel_blob_rw_s4ZWYR9uxySjQNBG_R1CaNfzUW8JIJ4nEcre8Pimjg2Hvvu";   // ←←← 必须修改
// =========================================================================

async function uploadFile(file) {
  if (!BLOB_TOKEN || BLOB_TOKEN.length < 50) {
    alert("请先把 BLOB_READ_WRITE_TOKEN 填入代码中！");
    return;
  }

  const formData = new FormData();
  formData.append('file', file);

  try {
    const res = await fetch('https://blob.vercel-storage.com/upload', {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${BLOB_TOKEN}`
      },
      body: formData
    });

    if (res.ok) {
      const data = await res.json();
      addToTable(file.name, data.url, (file.size / 1024 / 1024).toFixed(2) + ' MB');
      alert(`✅ 上传成功！\n直链：${data.url}`);
    } else {
      const err = await res.text();
      alert('上传失败：' + err);
    }
  } catch (e) {
    console.error(e);
    alert('上传异常，请按 F12 查看控制台');
  }
}

function addToTable(name, url, size) {
  const tbody = document.getElementById('fileList');
  const isAudio = /\.(mp3|wav|ogg|m4a)$/i.test(name);
  const row = document.createElement('tr');
  row.innerHTML = `
    <td>${tbody.children.length + 1}</td>
    <td>
      <a href="${url}" target="_blank">下载</a> | 
      <a href="#" onclick="copyLink('${url}');return false;">复制直链</a>
    </td>
    <td>${name}</td>
    <td>${size}</td>
    <td>${new Date().toLocaleString('zh-CN')}</td>
  `;
  tbody.appendChild(row);

  if (isAudio) {
    const audioRow = document.createElement('tr');
    audioRow.innerHTML = `<td colspan="5"><audio controls src="${url}"></audio></td>`;
    tbody.appendChild(audioRow);
  }
}

function copyLink(url) {
  navigator.clipboard.writeText(url).then(() => alert('✅ 直链已复制！'));
}

document.getElementById('fileInput').addEventListener('change', (e) => {
  Array.from(e.target.files).forEach(uploadFile);
});
</script>
</body>
</html>
