<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>阿湫外链网盘</title>
  <link href="https://s4.zstatic.net/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f0f2f5; font-family: "Microsoft YaHei", Arial, sans-serif; }

    .navbar {
      background: #00897b;
      padding: 0 20px;
      display: flex;
      align-items: center;
      height: 56px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }
    .navbar-brand { color: white; text-decoration: none; font-size: 20px; font-weight: bold; }
    .nav-links { margin-left: 40px; display: flex; gap: 24px; align-items: center; }
    .nav-links a { color: rgba(255,255,255,0.85); font-size: 14px; text-decoration: none; }
    .nav-links a:hover { color: white; }
    .nav-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
    .nav-user { color: rgba(255,255,255,0.9); font-size: 13px; }
    .btn-nav {
      background: rgba(255,255,255,0.2);
      color: white;
      border: 1px solid rgba(255,255,255,0.4);
      padding: 5px 14px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }
    .btn-nav:hover { background: rgba(255,255,255,0.3); }

    /* 弹窗通用 */
    .overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 500;
      justify-content: center;
      align-items: center;
    }
    .overlay.show { display: flex; }
    .auth-box {
      background: white;
      border-radius: 8px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.15);
      padding: 36px;
      width: 360px;
      text-align: center;
    }
    .auth-box h2 { color: #00897b; margin-bottom: 6px; font-size: 20px; }
    .auth-box p { color: #999; font-size: 13px; margin-bottom: 20px; }
    .auth-box input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 14px;
      margin-bottom: 12px;
      outline: none;
    }
    .auth-box input:focus { border-color: #00897b; }
    .btn-primary {
      width: 100%;
      background: #00897b;
      color: white;
      border: none;
      padding: 11px;
      border-radius: 4px;
      font-size: 15px;
      cursor: pointer;
      margin-top: 4px;
    }
    .btn-primary:hover { background: #00796b; }
    .auth-error { color: #e53935; font-size: 13px; margin-top: 10px; min-height: 20px; }
    .auth-switch { margin-top: 16px; font-size: 13px; color: #666; }
    .auth-switch a { color: #00897b; cursor: pointer; text-decoration: none; }
    .auth-switch a:hover { text-decoration: underline; }

    .container { max-width: 960px; margin: 30px auto; padding: 0 16px; }

    /* 未登录提示 */
    .guest-tip {
      background: #e0f2f1;
      border: 1px solid #b2dfdb;
      border-radius: 8px;
      padding: 16px 20px;
      margin-bottom: 24px;
      color: #00695c;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .guest-tip a { color: #00897b; font-weight: bold; cursor: pointer; }

    .upload-card {
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      padding: 30px;
      margin-bottom: 24px;
      text-align: center;
    }
    .upload-area {
      border: 2px dashed #00897b;
      border-radius: 8px;
      padding: 50px 20px;
      cursor: pointer;
      transition: all 0.2s;
      background: #f9fffe;
    }
    .upload-area:hover, .upload-area.dragover { border-color: #00bfa5; background: #e0f2f1; }
    .upload-area i { font-size: 48px; color: #00897b; margin-bottom: 12px; display: block; }
    .upload-area p { color: #666; margin-top: 8px; font-size: 13px; }
    .btn-upload {
      margin-top: 16px;
      background: #00897b;
      color: white;
      border: none;
      padding: 10px 32px;
      border-radius: 4px;
      font-size: 15px;
      cursor: pointer;
    }
    .btn-upload:hover { background: #00796b; }

    .progress-wrap { display: none; margin-top: 16px; }
    .progress-bar { height: 6px; background: #e0e0e0; border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; background: #00897b; width: 0%; transition: width 0.3s; }
    .progress-text { font-size: 12px; color: #666; margin-top: 4px; }

    .list-card { background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); overflow: hidden; }
    .list-header { padding: 16px 20px; border-bottom: 1px solid #eee; font-weight: bold; color: #333; font-size: 15px; }
    .file-item { display: flex; align-items: center; padding: 14px 20px; border-bottom: 1px solid #f5f5f5; gap: 12px; }
    .file-item:last-child { border-bottom: none; }
    .file-icon { font-size: 28px; width: 40px; text-align: center; flex-shrink: 0; }
    .file-info { flex: 1; min-width: 0; }
    .file-name { font-size: 14px; color: #333; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .file-meta { font-size: 12px; color: #999; margin-top: 3px; }
    .file-actions { display: flex; gap: 8px; flex-shrink: 0; }
    .btn-sm { padding: 5px 12px; border-radius: 4px; font-size: 12px; cursor: pointer; border: 1px solid; text-decoration: none; display: inline-block; background: white; }
    .btn-view { color: #00897b; border-color: #00897b; }
    .btn-view:hover { background: #e0f2f1; }
    .btn-copy { color: #1976d2; border-color: #1976d2; }
    .btn-copy:hover { background: #e3f2fd; }
    .btn-del { color: #e53935; border-color: #e53935; }
    .btn-del:hover { background: #ffebee; }

    /* 预览弹窗 */
    .modal-mask { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center; }
    .modal-mask.show { display: flex; }
    .modal-box { background: white; border-radius: 8px; max-width: 800px; width: 90%; overflow: hidden; }
    .modal-header { background: #00897b; color: white; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
    .modal-close { cursor: pointer; font-size: 20px; }
    .modal-body { padding: 20px; text-align: center; }
    .modal-body img { max-width: 100%; max-height: 70vh; border-radius: 4px; }
    .modal-body audio { width: 100%; margin: 10px 0; }
    .modal-links { margin-top: 16px; display: flex; flex-direction: column; gap: 10px; text-align: left; }
    .link-row { display: flex; align-items: center; gap: 8px; }
    .link-label { font-size: 13px; color: #666; width: 70px; flex-shrink: 0; }
    .link-input { flex: 1; padding: 6px 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 12px; color: #333; }
    .btn-copy2 { padding: 6px 14px; background: #00897b; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; flex-shrink: 0; }

    .empty { text-align: center; padding: 40px; color: #999; }
    .footer { text-align: center; padding: 24px; color: #999; font-size: 13px; margin-top: 24px; }
    .footer a { color: #00897b; text-decoration: none; }
    #runtime { color: #00897b; }
    .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.75); color: white; padding: 10px 24px; border-radius: 20px; font-size: 14px; z-index: 9999; display: none; }
  </style>
</head>
<body>

<div class="navbar">
  <a class="navbar-brand" href="./">阿湫外链网盘</a>
  <div class="nav-links">
    <a href="./">文件列表</a>
    <a href="https://t.me/icc469" target="_blank">与我联系</a>
  </div>
  <div class="nav-right">
    <span class="nav-user" id="navUser" style="display:none;"></span>
    <button class="btn-nav" id="btnLogout" style="display:none;" onclick="logout()">退出</button>
    <button class="btn-nav" id="btnLogin" onclick="showLoginModal()">登录</button>
    <button class="btn-nav" id="btnRegister" onclick="showRegisterModal()">注册</button>
  </div>
</div>

<!-- 登录弹窗 -->
<div class="overlay" id="loginOverlay">
  <div class="auth-box">
    <h2><i class="fa fa-sign-in"></i> 登录</h2>
    <p>登录后可上传和管理你的文件</p>
    <input type="text" id="loginUser" placeholder="用户名">
    <input type="password" id="loginPwd" placeholder="密码" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn-primary" onclick="doLogin()">登 录</button>
    <div class="auth-error" id="loginError"></div>
    <div class="auth-switch">还没有账号？<a onclick="showRegisterModal()">立即注册</a></div>
  </div>
</div>

<!-- 注册弹窗 -->
<div class="overlay" id="registerOverlay">
  <div class="auth-box">
    <h2><i class="fa fa-user-plus"></i> 注册</h2>
    <p>注册后即可上传和管理文件</p>
    <input type="text" id="regUser" placeholder="用户名（2-20位）">
    <input type="password" id="regPwd" placeholder="密码（至少6位）">
    <input type="password" id="regPwd2" placeholder="确认密码" onkeydown="if(event.key==='Enter')doRegister()">
    <button class="btn-primary" onclick="doRegister()">注 册</button>
    <div class="auth-error" id="registerError"></div>
    <div class="auth-switch">已有账号？<a onclick="showLoginModal()">立即登录</a></div>
  </div>
</div>

<div class="container">
  <!-- 游客提示 -->
  <div class="guest-tip" id="guestTip">
    <i class="fa fa-info-circle"></i>
    你当前未登录，仅能浏览文件。<a onclick="showLoginModal()">登录</a> 或 <a onclick="showRegisterModal()">注册</a> 后可上传和管理文件。
  </div>

  <!-- 上传区（登录后显示） -->
  <div class="upload-card" id="uploadCard" style="display:none;">
    <div class="upload-area" id="uploadArea">
      <i class="fa fa-cloud-upload"></i>
      <div style="font-size:16px;color:#333;">拖拽文件到此处或点击上传</div>
      <p>支持图片、音乐、视频等，推荐单文件 &lt; 50MB</p>
      <input type="file" id="fileInput" multiple style="display:none;">
      <button class="btn-upload" onclick="document.getElementById('fileInput').click()">选择文件上传</button>
    </div>
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-text" id="progressText">上传中...</div>
    </div>
  </div>

  <div class="list-card">
    <div class="list-header"><i class="fa fa-list"></i> 文件列表</div>
    <div id="fileList"><div class="empty"><i class="fa fa-inbox" style="font-size:32px;"></i><p style="margin-top:8px;">暂无文件</p></div></div>
  </div>
</div>

<div class="footer">
  Copyright © <span id="year"></span> <a href="./">阿湫外链网盘</a> 本站已安全运行：<span id="runtime"></span>
</div>

<!-- 预览弹窗 -->
<div class="modal-mask" id="modal" onclick="closeModal(event)">
  <div class="modal-box">
    <div class="modal-header">
      <span id="modalTitle">文件查看</span>
      <span class="modal-close" onclick="document.getElementById('modal').classList.remove('show')">✕</span>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const startDate = new Date('2025-03-16T03:16:11');
document.getElementById('year').textContent = new Date().getFullYear();

function updateRuntime() {
  const now = new Date();
  const diff = now - startDate;
  const totalDays = Math.floor(diff / (1000 * 60 * 60 * 24));
  const years = Math.floor(totalDays / 365);
  const remainDays = totalDays % 365;
  const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
  const seconds = Math.floor((diff % (1000 * 60)) / 1000);
  document.getElementById('runtime').textContent = years > 0
    ? `${years}年${remainDays}天${hours}时${minutes}分${seconds}秒`
    : `${totalDays}天${hours}时${minutes}分${seconds}秒`;
}
updateRuntime();
setInterval(updateRuntime, 1000);

// ===== 用户状态 =====
let currentUser = sessionStorage.getItem('username') || null;

function updateNavUI() {
  const loggedIn = !!currentUser;
  document.getElementById('navUser').style.display = loggedIn ? 'inline' : 'none';
  document.getElementById('navUser').textContent = `👤 ${currentUser}`;
  document.getElementById('btnLogout').style.display = loggedIn ? 'inline' : 'none';
  document.getElementById('btnLogin').style.display = loggedIn ? 'none' : 'inline';
  document.getElementById('btnRegister').style.display = loggedIn ? 'none' : 'inline';
  document.getElementById('guestTip').style.display = loggedIn ? 'none' : 'flex';
  document.getElementById('uploadCard').style.display = loggedIn ? 'block' : 'none';
}

function showLoginModal() {
  document.getElementById('loginOverlay').classList.add('show');
  document.getElementById('registerOverlay').classList.remove('show');
  document.getElementById('loginError').textContent = '';
}
function showRegisterModal() {
  document.getElementById('registerOverlay').classList.add('show');
  document.getElementById('loginOverlay').classList.remove('show');
  document.getElementById('registerError').textContent = '';
}

// 点击遮罩关闭
document.getElementById('loginOverlay').addEventListener('click', (e) => {
  if (e.target === document.getElementById('loginOverlay')) document.getElementById('loginOverlay').classList.remove('show');
});
document.getElementById('registerOverlay').addEventListener('click', (e) => {
  if (e.target === document.getElementById('registerOverlay')) document.getElementById('registerOverlay').classList.remove('show');
});

async function doLogin() {
  const username = document.getElementById('loginUser').value.trim();
  const password = document.getElementById('loginPwd').value;
  const errEl = document.getElementById('loginError');
  errEl.textContent = '';
  if (!username || !password) { errEl.textContent = '请填写用户名和密码'; return; }
  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
    });
    const data = await res.json();
    if (res.ok) {
      currentUser = username;
      sessionStorage.setItem('username', username);
      document.getElementById('loginOverlay').classList.remove('show');
      updateNavUI();
      loadFiles();
      showToast('✅ 登录成功！');
    } else {
      errEl.textContent = data.error || '登录失败';
    }
  } catch (e) {
    errEl.textContent = '网络错误，请重试';
  }
}

async function doRegister() {
  const username = document.getElementById('regUser').value.trim();
  const password = document.getElementById('regPwd').value;
  const password2 = document.getElementById('regPwd2').value;
  const errEl = document.getElementById('registerError');
  errEl.textContent = '';
  if (!username || !password) { errEl.textContent = '请填写完整信息'; return; }
  if (password !== password2) { errEl.textContent = '两次密码不一致'; return; }
  try {
    const res = await fetch('/api/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
    });
    const data = await res.json();
    if (res.ok) {
      currentUser = username;
      sessionStorage.setItem('username', username);
      document.getElementById('registerOverlay').classList.remove('show');
      updateNavUI();
      loadFiles();
      showToast('✅ 注册成功！');
    } else {
      errEl.textContent = data.error || '注册失败';
    }
  } catch (e) {
    errEl.textContent = '网络错误，请重试';
  }
}

function logout() {
  currentUser = null;
  sessionStorage.removeItem('username');
  updateNavUI();
  renderFiles([]);
  showToast('已退出登录');
}

// ===== 文件功能 =====
function getFileIcon(name, type) {
  if (/\.(jpg|jpeg|png|gif|webp|bmp|svg)$/i.test(name) || (type && type.startsWith('image/'))) return '🖼️';
  if (/\.(mp3|wav|ogg|m4a|flac|aac)$/i.test(name) || (type && type.startsWith('audio/'))) return '🎵';
  if (/\.(mp4|avi|mov|mkv|webm)$/i.test(name) || (type && type.startsWith('video/'))) return '🎬';
  return '📄';
}
function isImage(name, type) { return /\.(jpg|jpeg|png|gif|webp|bmp|svg)$/i.test(name) || (type && type.startsWith('image/')); }
function isAudio(name, type) { return /\.(mp3|wav|ogg|m4a|flac|aac)$/i.test(name) || (type && type.startsWith('audio/')); }
function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1024 / 1024).toFixed(2) + ' MB';
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 2000);
}
function copyText(text) {
  navigator.clipboard.writeText(text).then(() => showToast('✅ 已复制到剪贴板'));
}
function openModal(record) {
  document.getElementById('modalTitle').textContent = record.name;
  const body = document.getElementById('modalBody');
  let preview = '';
  if (isImage(record.name, record.type)) {
    preview = `<img src="${record.url}" alt="${record.name}">`;
  } else if (isAudio(record.name, record.type)) {
    preview = `<audio controls src="${record.url}"></audio>`;
  } else {
    preview = `<p style="color:#999;padding:20px;">此文件类型不支持预览</p>`;
  }
  body.innerHTML = `
    ${preview}
    <div class="modal-links">
      <div class="link-row">
        <span class="link-label">文件链接：</span>
        <input class="link-input" value="${record.url}" readonly>
        <button class="btn-copy2" onclick="copyText('${record.url}')">复制</button>
      </div>
      <div class="link-row">
        <span class="link-label">下载链接：</span>
        <input class="link-input" value="${record.url}" readonly>
        <button class="btn-copy2" onclick="copyText('${record.url}')">复制</button>
      </div>
    </div>
  `;
  document.getElementById('modal').classList.add('show');
}
function closeModal(e) {
  if (e.target === document.getElementById('modal')) document.getElementById('modal').classList.remove('show');
}

function renderFiles(files) {
  const container = document.getElementById('fileList');
  if (!currentUser) {
    container.innerHTML = '<div class="empty"><i class="fa fa-lock" style="font-size:32px;"></i><p style="margin-top:8px;">登录后查看你的文件</p></div>';
    return;
  }
  if (!files || files.length === 0) {
    container.innerHTML = '<div class="empty"><i class="fa fa-inbox" style="font-size:32px;"></i><p style="margin-top:8px;">暂无文件，快去上传吧</p></div>';
    return;
  }
  container.innerHTML = files.map(f => `
    <div class="file-item" id="item-${f.id}">
      <div class="file-icon">${getFileIcon(f.name, f.type || '')}</div>
      <div class="file-info">
        <div class="file-name" title="${f.name}">${f.name}</div>
        <div class="file-meta">${formatSize(f.size)} · ${new Date(f.uploadedAt).toLocaleString('zh-CN')}</div>
      </div>
      <div class="file-actions">
        <a class="btn-sm btn-view" href="javascript:void(0)" onclick='openModal(${JSON.stringify(f)})'>查看</a>
        <a class="btn-sm btn-copy" href="javascript:void(0)" onclick="copyText('${f.url}')">复制链接</a>
        <a class="btn-sm btn-del" href="javascript:void(0)" onclick="deleteFile('${f.id}','${f.url}')">删除</a>
      </div>
    </div>
  `).join('');
}

async function loadFiles() {
  if (!currentUser) { renderFiles([]); return; }
  try {
    const res = await fetch('/api/files', { headers: { 'x-username': currentUser } });
    const files = await res.json();
    renderFiles(files);
  } catch (e) { console.error(e); }
}

async function deleteFile(id, url) {
  if (!confirm('确定删除这个文件吗？')) return;
  try {
    await fetch('/api/delete', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-username': currentUser },
      body: JSON.stringify({ id, url }),
    });
    document.getElementById('item-' + id)?.remove();
    showToast('🗑️ 文件已删除');
    const list = document.getElementById('fileList');
    if (list.querySelectorAll('.file-item').length === 0) renderFiles([]);
  } catch (e) { showToast('删除失败：' + e.message); }
}

async function uploadFile(file) {
  if (!currentUser) { showToast('请先登录'); return; }
  const progressWrap = document.getElementById('progressWrap');
  const progressFill = document.getElementById('progressFill');
  const progressText = document.getElementById('progressText');
  progressWrap.style.display = 'block';
  progressFill.style.width = '0%';
  progressText.textContent = `正在上传：${file.name}`;
  let progress = 0;
  const timer = setInterval(() => { progress = Math.min(progress + 10, 85); progressFill.style.width = progress + '%'; }, 200);
  try {
    const res = await fetch('/api/upload', {
      method: 'POST',
      headers: {
        'x-filename': encodeURIComponent(file.name),
        'x-username': currentUser,
        'Content-Type': file.type || 'application/octet-stream',
      },
      body: file,
    });
    clearInterval(timer);
    if (!res.ok) { const err = await res.json(); throw new Error(err.error || '上传失败'); }
    progressFill.style.width = '100%';
    progressText.textContent = '上传成功！';
    setTimeout(() => { progressWrap.style.display = 'none'; }, 1500);
    showToast('✅ 上传成功！');
    loadFiles();
  } catch (e) {
    clearInterval(timer);
    progressWrap.style.display = 'none';
    showToast('❌ 上传失败：' + e.message);
  }
}

document.getElementById('fileInput').addEventListener('change', (e) => {
  Array.from(e.target.files).forEach(uploadFile);
  e.target.value = '';
});
const uploadArea = document.getElementById('uploadArea');
uploadArea.addEventListener('dragover', (e) => { e.preventDefault(); uploadArea.classList.add('dragover'); });
uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
